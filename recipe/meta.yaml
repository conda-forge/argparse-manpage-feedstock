{% set name = "argparse-manpage" %}
{% set version = "4.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 1deab76b212ac8753cbb67b9d2d2bc0949bbc338bb1cc3547f0890cb34108b32

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - argparse-manpage = argparse_manpage.cli:main

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - tomli

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - argparse_manpage
    - build_manpages
  commands:
    # check metadata
    - python -m pip check argparse-manpage
    - python -m pip show argparse-manpage
    # check entry points
    - argparse-manpage --help

about:
  home: https://github.com/praiskup/argparse-manpage
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Build manual page from python's ArgumentParser object.

extra:
  recipe-maintainers:
    - duncanmmacleod
